server:
  port: 8080

spring:
  application:
    name: used-car-management-api
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:usedcar;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.usedcar.entity
  configuration:
    map-underscore-to-camel-case: true
